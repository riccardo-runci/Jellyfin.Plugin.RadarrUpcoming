name: "Publish Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0.0)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Need full history so we can push back to main
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # Install JPRM (Jellyfin Plugin Repository Manager)
      - name: Install JPRM
        run: pip install jprm

      # Derive version from tag (strip leading "v") or manual input
      - name: Derive version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # tag is e.g. v1.0.0 → version 1.0.0.0
            raw="${GITHUB_REF_NAME#v}"
            # If the version has fewer than 4 parts, append .0
            IFS='.' read -ra parts <<< "$raw"
            while [ "${#parts[@]}" -lt 4 ]; do parts+=("0"); done
            echo "version=$(IFS='.'; echo "${parts[*]}")" >> "$GITHUB_OUTPUT"
          fi

      # Build the plugin zip with the correct version baked in
      - name: Build plugin with JPRM
        run: |
          mkdir -p artifacts
          zipfile=$(jprm --verbosity=debug plugin build . \
            --output=artifacts \
            --version="${{ steps.version.outputs.version }}" \
            --dotnet-framework net9.0)
          echo "ARTIFACT=${zipfile}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error
          retention-days: 30

      # Create/update the GitHub Release and upload the zip
      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Radarr Upcoming v${{ steps.version.outputs.version }}"
          body: |
            ## Radarr Upcoming v${{ steps.version.outputs.version }}

            ### Install via Jellyfin Plugin Repository (recommended)

            1. Open Jellyfin → **Dashboard → Plugins → Repositories**
            2. Add this URL:
               ```
               https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json
               ```
            3. Search the catalog for **Radarr Upcoming** and install it.

            ### Manual install

            Download the `.zip` below, unzip the `.dll` into a named subfolder inside
            your Jellyfin `plugins/` directory, then restart Jellyfin.
          files: ${{ env.ARTIFACT }}
          draft: false
          prerelease: false

      # Build manifest.json manually so sourceUrl points directly at the
      # GitHub Release asset (JPRM always appends a slug subfolder to --url,
      # which produces a 404 when the zip lives at the release root).
      - name: Update manifest.json
        env:
          ARTIFACT: ${{ env.ARTIFACT }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PYEOF'
import json, os, hashlib, datetime, yaml

artifact  = os.environ["ARTIFACT"]
repo      = os.environ["REPO"]
tag       = os.environ["TAG"]
version   = os.environ["VERSION"]

filename   = os.path.basename(artifact)
source_url = f"https://github.com/{repo}/releases/download/{tag}/{filename}"
checksum   = hashlib.md5(open(artifact, "rb").read()).hexdigest()
timestamp  = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")

build = yaml.safe_load(open("build.yaml"))

new_entry = {
    "version":   version,
    "changelog": str(build.get("changelog", "")).strip(),
    "targetAbi": str(build.get("targetAbi", "10.9.0.0")),
    "sourceUrl": source_url,
    "checksum":  checksum,
    "timestamp": timestamp,
}

manifest_path = "manifest.json"
if os.path.exists(manifest_path):
    with open(manifest_path) as f:
        manifest = json.load(f)
else:
    manifest = [{
        "guid":        str(build["guid"]),
        "name":        str(build["name"]),
        "description": str(build.get("description", build.get("overview", ""))).strip(),
        "overview":    str(build.get("overview", "")).strip(),
        "owner":       str(build.get("owner", "")),
        "category":    str(build.get("category", "General")),
        "versions":    [],
    }]

plugin = manifest[0]
plugin["versions"] = [v for v in plugin.get("versions", []) if v["version"] != version]
plugin["versions"].insert(0, new_entry)

with open(manifest_path, "w") as f:
    json.dump(manifest, f, indent=4)
    f.write("\n")

print(f"manifest.json updated — version={version}, sourceUrl={source_url}, checksum={checksum}")
PYEOF

      - name: Commit manifest.json to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add manifest.json
          git diff --cached --quiet && echo "No changes to manifest.json" && exit 0
          git commit -m "chore: update manifest.json for ${{ github.ref_name }}"
          git push origin main
