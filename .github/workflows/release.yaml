name: "Publish Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # JPRM builds the plugin and produces a versioned zip + manifest fragment
      - name: Build with JPRM
        uses: oddstr13/jellyfin-plugin-repository-manager@v1.1.1
        id: jprm
        with:
          dotnet-target: "net9.0"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ${{ steps.jprm.outputs.artifact }}
          if-no-files-found: error
          retention-days: 30

      # Derive the version string from the git tag (strip leading "v")
      - name: Derive version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      # Create (or update) the GitHub Release and upload the artifact
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Radarr Upcoming ${{ steps.version.outputs.version }}"
          body: |
            ## Radarr Upcoming v${{ steps.version.outputs.version }}

            ### Installation via Jellyfin Plugin Repository

            1. Open Jellyfin → **Dashboard → Plugins → Repositories**
            2. Add the following URL as a new repository:
               ```
               https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json
               ```
            3. Refresh the catalog and install **Radarr Upcoming**.

            ### Manual Installation

            Download the `.zip` from the assets below, extract the `.dll` into a subfolder
            under your Jellyfin `plugins/` directory, then restart Jellyfin.
          files: ${{ steps.jprm.outputs.artifact }}
          draft: false
          prerelease: false

      # Regenerate the top-level manifest.json that serves as a plugin repository
      - name: Update manifest.json
        run: |
          artifact_path="${{ steps.jprm.outputs.artifact }}"
          checksum=$(md5sum "$artifact_path" | awk '{print $1}')
          file_size=$(stat -c%s "$artifact_path")
          artifact_filename=$(basename "$artifact_path")
          download_url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${artifact_filename}"

          cat > manifest.json <<EOF
          [
            {
              "guid": "a8b7c6d5-e4f3-4a2b-b1c0-d9e8f7a6b5c4",
              "name": "Radarr Upcoming",
              "overview": "Shows your Radarr Wanted list as an Upcoming section in Jellyfin.",
              "description": "Fetches the Wanted (monitored, not-yet-downloaded) movie list from your Radarr instance and exposes it through a Jellyfin REST API so it can be displayed as an Upcoming section on the home page.",
              "owner": "riccardo-runci",
              "category": "General",
              "imageUrl": "",
              "versions": [
                {
                  "version": "${{ steps.version.outputs.version }}",
                  "changelog": "See https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}",
                  "targetAbi": "10.9.0.0",
                  "sourceUrl": "${download_url}",
                  "checksum": "${checksum}",
                  "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                }
              ]
            }
          ]
          EOF

      - name: Commit updated manifest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "chore: update manifest.json for ${{ github.ref_name }}"
          git push origin HEAD:main
