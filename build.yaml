framework: "net9.0"
overview: "Shows your Radarr Wanted list as an Upcoming section in Jellyfin."
description: >
  Fetches the Wanted (monitored, not-yet-downloaded) movie list from your Radarr
  instance and exposes it through a Jellyfin REST API so it can be displayed as
  an Upcoming section on the home page.
  Configure the plugin with your Radarr URL and API key under Dashboard → Plugins.
category: "General"
owner: "riccardo-runci"
artifacts:
  - "Jellyfin.Plugin.RadarrUpcoming.dll"
changelog: >
  Fix: the manual refresh endpoint now also writes .strm/.nfo stubs to the
  configured StubLibraryPath, instead of only updating the in-memory cache.
  Added detailed logging so failures are visible in the Jellyfin log.
